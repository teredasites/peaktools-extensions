<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CopyUnlock - Clipboard History</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <header class="search-header">
    <input type="text" id="search-input" class="search-input" data-i18n-placeholder="searchPlaceholder" placeholder="Search clipboard history..." autocomplete="off">
  </header>

  <nav class="view-tabs">
    <button class="view-tab active" data-view="recent">Recent</button>
    <button class="view-tab" data-view="pinned">Pinned</button>
    <button class="view-tab" data-view="projects">Projects</button>
  </nav>

  <!-- Upgrade banner -->
  <div id="upgrade-banner" class="upgrade-banner hidden">
    <span id="upgrade-banner-msg" class="upgrade-banner-msg"></span>
    <button id="upgrade-banner-btn" class="upgrade-btn">Upgrade &mdash; $1.99/mo</button>
    <button id="upgrade-banner-close" class="upgrade-close">&times;</button>
  </div>

  <main id="clip-list" class="clip-list"></main>

  <!-- Projects Panel (replaces clip-list when Projects filter active) -->
  <div id="projects-panel" class="projects-panel hidden">
    <div class="projects-header">
      <span class="projects-title">Projects</span>
      <button id="new-project-btn" class="new-project-btn">+ New Project</button>
    </div>
    <div id="projects-list" class="projects-list"></div>
  </div>

  <!-- Project Detail Panel -->
  <div id="project-detail" class="project-detail hidden">
    <div class="project-detail-header">
      <button id="project-back" class="detail-back-btn">&larr; Projects</button>
      <div class="project-detail-actions">
        <button id="project-export-txt" class="detail-action-btn" title="Export as .txt">Export .txt</button>
        <button id="project-export-html" class="detail-action-btn" title="Export as .html">Export .html</button>
        <button id="project-export-pdf" class="detail-action-btn" title="Export as PDF (Print)">Export PDF</button>
        <button id="project-edit" class="detail-action-btn">Edit</button>
        <button id="project-delete-btn" class="detail-action-btn danger">Delete</button>
      </div>
    </div>
    <div id="project-detail-info" class="project-detail-info"></div>
    <div id="project-items-list" class="clip-list project-items-list"></div>
  </div>

  <div id="detail-panel" class="detail-panel hidden">
    <div class="detail-header">
      <button id="detail-back" class="detail-back-btn" aria-label="Back">&larr; <span data-i18n="back">Back</span></button>
      <div class="detail-actions">
        <button id="detail-copy" class="detail-action-btn" data-i18n="copy">Copy</button>
        <button id="detail-copy-citation" class="detail-action-btn" title="Copy with citation" data-i18n="cite">+ Cite</button>
        <button id="detail-open-url" class="detail-action-btn hidden" title="Open source page" data-i18n="open">Open</button>
        <button id="detail-copy-url" class="detail-action-btn hidden" title="Copy URL to clipboard">Copy URL</button>
        <button id="detail-pin" class="detail-action-btn" data-i18n="pin">Pin</button>
        <button id="detail-delete" class="detail-action-btn danger" data-i18n="delete">Delete</button>
      </div>
    </div>
    <div id="detail-content" class="detail-content"></div>
    <div id="detail-citation" class="detail-citation hidden"></div>
    <div id="detail-meta" class="detail-meta"></div>
    <div id="detail-collection" class="detail-collection">
      <label class="detail-collection-label">Project:</label>
      <select id="detail-collection-select" class="collection-select-small" title="Assign to project folder">
        <option value="" data-i18n="none">None</option>
      </select>
      <button id="detail-new-project" class="detail-new-project-btn" title="Create new project">+</button>
    </div>
    <div id="detail-tags" class="detail-tags"></div>
  </div>

  <!-- Quick Add overlay -->
  <div id="add-overlay" class="add-overlay hidden">
    <div class="add-overlay-content">
      <div class="add-overlay-header">
        <span class="add-overlay-title" data-i18n="addTitle">Add to Clipboard History</span>
        <button id="add-overlay-close" class="add-overlay-close">&times;</button>
      </div>
      <textarea id="add-input" class="add-input" data-i18n-placeholder="addPlaceholder" placeholder="Paste or type anything — URLs, text, code..." rows="5"></textarea>
      <div class="add-overlay-footer">
        <select id="add-type-select" class="add-type-select" title="Content type">
          <option value="auto" data-i18n="typeAuto">Auto-detect</option>
          <option value="text" data-i18n="filterText">Text</option>
          <option value="url" data-i18n="filterUrls">URL</option>
          <option value="code" data-i18n="filterCode">Code</option>
          <option value="email">Email</option>
          <option value="html">HTML</option>
        </select>
        <span id="add-type-hint" class="add-type-hint">text</span>
        <button id="add-save" class="add-save-btn" data-i18n="save">Save</button>
      </div>
    </div>
  </div>

  <!-- New Project overlay -->
  <div id="project-overlay" class="add-overlay hidden">
    <div class="add-overlay-content project-overlay-content">
      <div class="add-overlay-header">
        <span class="add-overlay-title">New Project</span>
        <button id="project-overlay-close" class="add-overlay-close">&times;</button>
      </div>
      <div class="project-form">
        <div class="project-form-field">
          <label class="project-form-label">Name</label>
          <input type="text" id="project-name-input" class="project-form-input" placeholder="e.g. Research Paper, Client Work..." maxlength="50">
        </div>
        <div class="project-form-field">
          <label class="project-form-label">Description</label>
          <input type="text" id="project-desc-input" class="project-form-input" placeholder="Optional description..." maxlength="200">
        </div>
        <div class="project-form-field">
          <label class="project-form-label">Auto-capture domains</label>
          <div class="domain-chips-container">
            <div id="domain-chips" class="domain-chips"></div>
            <input type="text" id="domain-input" class="domain-input" placeholder="Type domain + Enter (e.g. github.com)">
          </div>
          <span class="project-form-hint">Clips from these domains auto-file into this project</span>
        </div>
        <div class="project-form-field">
          <label class="project-form-label">Color</label>
          <div id="color-picker" class="color-picker"></div>
        </div>
      </div>
      <div class="add-overlay-footer">
        <button id="project-save" class="add-save-btn">Create Project</button>
      </div>
    </div>
  </div>

  <footer class="panel-footer">
    <span id="item-count" class="item-count">0 items</span>
    <div class="footer-actions">
      <button id="new-project-footer-btn" class="new-project-footer-btn" title="Create new project folder">+ Project</button>
      <button id="add-item" class="add-item-btn" title="Add to clipboard history" data-i18n="addButton">+ Add</button>
      <button id="clear-all" class="clear-all-btn" data-i18n="clearAll">Clear All</button>
    </div>
  </footer>

  <script src="../../dist/sidepanel/sidepanel.js"></script>
</body>
</html>
