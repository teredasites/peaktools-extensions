name: Publish Extension to Chrome Web Store

on:
  workflow_dispatch:
    inputs:
      extension:
        description: 'Extension folder name (e.g., clipunlock)'
        required: true
        type: string

jobs:
  publish:
    name: Build & Upload to CWS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ inputs.extension }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ inputs.extension }}
        run: npm ci

      - name: Build
        working-directory: ${{ inputs.extension }}
        run: npm run build

      - name: Run tests
        working-directory: ${{ inputs.extension }}
        run: npx vitest run

      - name: Package ZIP
        working-directory: ${{ inputs.extension }}
        run: node scripts/package.mjs

      - name: Get access token
        id: token
        run: |
          RESPONSE=$(curl -s -X POST https://oauth2.googleapis.com/token \
            -d "client_id=${{ secrets.CWS_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.CWS_CLIENT_SECRET }}" \
            -d "refresh_token=${{ secrets.CWS_REFRESH_TOKEN }}" \
            -d "grant_type=refresh_token")
          TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')
          echo "access_token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Upload to Chrome Web Store
        run: |
          ZIP_FILE=$(ls ${{ inputs.extension }}/*.zip | head -1)
          curl -s \
            -H "Authorization: Bearer ${{ steps.token.outputs.access_token }}" \
            -H "x-goog-api-version: 2" \
            -X PUT \
            -T "$ZIP_FILE" \
            "https://www.googleapis.com/upload/chromewebstore/v1.1/items/${{ secrets.CWS_ITEM_ID }}"

      - name: Publish to Chrome Web Store
        run: |
          curl -s \
            -H "Authorization: Bearer ${{ steps.token.outputs.access_token }}" \
            -H "x-goog-api-version: 2" \
            -H "Content-Length: 0" \
            -X POST \
            "https://www.googleapis.com/chromewebstore/v1.1/items/${{ secrets.CWS_ITEM_ID }}/publish"
